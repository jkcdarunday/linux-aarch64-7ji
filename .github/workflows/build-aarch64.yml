name: Build PKGBUILD (aarch64)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ linux/arm64 ]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Set up QEMU for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Build with makepkg
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.build
          platforms: linux/arm64
          push: false
          load: true
          tags: pkgbuild-aarch64:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Extract packages from image
        run: |
          mkdir -p ./output
          docker run --rm -v ./output:/output pkgbuild-aarch64:latest sh -c 'cp /home/builder/src/**/*.pkg.tar.zst /output/ 2>/dev/null || true'
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packages-aarch64
          path: output/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: output/**/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
